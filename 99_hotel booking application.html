<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Booking App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
    }

    .container {
        padding: 25px;
    }

    .rooms {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        padding: 15px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .price {
        color: #00c6ff;
        font-size: 18px;
        margin: 5px 0;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: #00c6ff;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0072ff;
    }

    .booking-form {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    .booking-form input {
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    .booking-form button {
        grid-column: span 3;
        padding: 12px;
        font-weight: bold;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .delete-btn {
        padding: 6px 10px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
    }

    .delete-btn:hover {
        background: #ff1e3c;
    }
</style>

</head>
<body>

<div class="header">🏨 Hotel Booking Application</div>

<div class="container">

    <!-- ROOMS -->
    <h3>Available Rooms</h3>
    <div class="rooms">
        <div class="card">
            <h4>Deluxe Room</h4>
            <div class="price">₹3000 / night</div>
            <button onclick="selectRoom('Deluxe Room',3000)">Book</button>
        </div>

        <div class="card">
            <h4>Standard Room</h4>
            <div class="price">₹2000 / night</div>
            <button onclick="selectRoom('Standard Room',2000)">Book</button>
        </div>

        <div class="card">
            <h4>Luxury Suite</h4>
            <div class="price">₹5000 / night</div>
            <button onclick="selectRoom('Luxury Suite',5000)">Book</button>
        </div>
    </div>

    <!-- BOOKING FORM -->
    <h3>Book Room</h3>
    <div class="booking-form">
        <input type="text" id="name" placeholder="Your Name">
        <input type="date" id="date">
        <input type="text" id="room" placeholder="Room Type" readonly>
        <input type="number" id="price" placeholder="Price" readonly>

        <button onclick="addBooking()">Confirm Booking</button>
    </div>

    <!-- BOOKINGS TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Room</th>
                <th>Date</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="bookingTable"></tbody>
    </table>

</div>

<script>
    let bookings = [];

    function selectRoom(room, price) {
        document.getElementById("room").value = room;
        document.getElementById("price").value = price;
    }

    function addBooking() {
        const name = document.getElementById("name").value;
        const date = document.getElementById("date").value;
        const room = document.getElementById("room").value;
        const price = document.getElementById("price").value;

        if (!name || !date || !room) {
            alert("Please fill all fields");
            return;
        }

        bookings.push({
            id: bookings.length + 1,
            name,
            date,
            room,
            price
        });

        document.getElementById("name").value = "";
        document.getElementById("date").value = "";
        document.getElementById("room").value = "";
        document.getElementById("price").value = "";

        renderBookings();
    }

    function renderBookings() {
        const table = document.getElementById("bookingTable");
        table.innerHTML = "";

        bookings.forEach(b => {
            table.innerHTML += `
                <tr>
                    <td>${b.id}</td>
                    <td>${b.name}</td>
                    <td>${b.room}</td>
                    <td>${b.date}</td>
                    <td>₹${b.price}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteBooking(${b.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function deleteBooking(id) {
        bookings = bookings.filter(b => b.id !== id);
        renderBookings();
    }
</script>

</body>
</html>
