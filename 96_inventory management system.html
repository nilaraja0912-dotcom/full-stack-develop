<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Management System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
    }

    .container {
        padding: 25px;
    }

    .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    .form input {
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    .form button {
        grid-column: span 4;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .form button:hover {
        background: #0072ff;
        transform: scale(1.03);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
        transition: 0.3s;
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .low-stock {
        background: rgba(255, 0, 0, 0.2) !important;
    }

    .delete-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #ff1e3c;
    }

    .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        background: #00c851;
    }
</style>

</head>
<body>

<div class="header">📦 Inventory Management System</div>

<div class="container">

    <!-- FORM -->
    <div class="form">
        <input type="text" id="product" placeholder="Product Name">
        <input type="text" id="category" placeholder="Category">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="qty" placeholder="Quantity">

        <button onclick="addItem()">Add Product</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
    </table>

</div>

<script>
    let inventory = [
        { id: 1, product: "Laptop", category: "Electronics", price: 50000, qty: 5 },
        { id: 2, product: "Mouse", category: "Accessories", price: 500, qty: 2 }
    ];

    function renderInventory() {
        const table = document.getElementById("inventoryTable");
        table.innerHTML = "";

        inventory.forEach(item => {
            const lowStock = item.qty <= 3;

            table.innerHTML += `
                <tr class="${lowStock ? 'low-stock' : ''}">
                    <td>${item.id}</td>
                    <td>${item.product}</td>
                    <td>${item.category}</td>
                    <td>₹${item.price}</td>
                    <td>${item.qty}</td>
                    <td>
                        <span class="badge">
                            ${lowStock ? "Low Stock" : "In Stock"}
                        </span>
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function addItem() {
        const product = document.getElementById("product").value;
        const category = document.getElementById("category").value;
        const price = document.getElementById("price").value;
        const qty = document.getElementById("qty").value;

        if (!product || !category || !price || !qty) {
            alert("Please fill all fields");
            return;
        }

        inventory.push({
            id: inventory.length + 1,
            product,
            category,
            price,
            qty
        });

        document.getElementById("product").value = "";
        document.getElementById("category").value = "";
        document.getElementById("price").value = "";
        document.getElementById("qty").value = "";

        renderInventory();
    }

    function deleteItem(id) {
        inventory = inventory.filter(i => i.id !== id);
        renderInventory();
    }

    renderInventory();
</script>

</body>
</html>
