<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logging System Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.card h3{
    color:#38bdf8;
}

.card p{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
}

.log-panel{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-bottom:20px;
}

.log-window{
    background:#020617;
    border-radius:15px;
    padding:20px;
    height:350px;
    overflow-y:auto;
    font-family:monospace;
}

.info{
    color:#38bdf8;
    margin-bottom:10px;
}

.success{
    color:#22c55e;
    margin-bottom:10px;
}

.warning{
    color:#facc15;
    margin-bottom:10px;
}

.error{
    color:#ef4444;
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:28px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#22c55e;
    text-align:center;
    line-height:28px;
    font-weight:bold;
    transition:1s;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>📜 Logging System</h1>
    <p>Application Monitoring & Log Management</p>
</div>

<div class="stats">

    <div class="card">
        <h3>Total Logs</h3>
        <p id="totalLogs">0</p>
    </div>

    <div class="card">
        <h3>Info Logs</h3>
        <p id="infoLogs">0</p>
    </div>

    <div class="card">
        <h3>Error Logs</h3>
        <p id="errorLogs">0</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p id="status">Idle</p>
    </div>

</div>

<div class="log-panel">

<button onclick="startLogging()">
🚀 Start Log Monitoring
</button>

<div class="log-window" id="logWindow">
System waiting for logs...
</div>

<div class="progress">
    <div class="bar" id="progressBar">0%</div>
</div>

</div>

</div>

<script>

async function startLogging(){

const logs = [

{type:"info",msg:"Server started successfully"},
{type:"success",msg:"Database connection established"},
{type:"info",msg:"User authentication request received"},
{type:"warning",msg:"High memory usage detected"},
{type:"success",msg:"Background task completed"},
{type:"error",msg:"API request timeout occurred"},
{type:"info",msg:"Cache refreshed successfully"},
{type:"success",msg:"Backup completed successfully"}

];

let info=0;
let error=0;

document.getElementById("logWindow").innerHTML="";

for(let i=0;i<logs.length;i++){

const log=logs[i];

const div=document.createElement("div");
div.className=log.type;
div.innerHTML=
`[${new Date().toLocaleTimeString()}] ${log.msg}`;

document.getElementById("logWindow")
.appendChild(div);

if(log.type==="info") info++;
if(log.type==="error") error++;

document.getElementById("totalLogs")
.innerHTML=i+1;

document.getElementById("infoLogs")
.innerHTML=info;

document.getElementById("errorLogs")
.innerHTML=error;

let progress=((i+1)/logs.length)*100;

document.getElementById("progressBar")
.style.width=progress+"%";

document.getElementById("progressBar")
.innerHTML=Math.round(progress)+"%";

await new Promise(resolve=>setTimeout(resolve,700));
}

document.getElementById("status")
.innerHTML="Monitoring ✅";

document.getElementById("progressBar")
.innerHTML="Logging Active 🚀";

}

</script>

</body>
</html>
