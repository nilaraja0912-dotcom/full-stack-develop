<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Software Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
    }

    .header {
        padding: 20px;
        text-align: center;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        padding: 25px;
    }

    .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    .form input, .form select {
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    .form button {
        grid-column: span 4;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .form button:hover {
        background: #0072ff;
        transform: scale(1.03);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
        transition: 0.3s;
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .new { background: #ffb703; }
    .contacted { background: #00c6ff; }
    .converted { background: #00c851; }

    .delete-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #ff1e3c;
    }
</style>

</head>
<body>

<div class="header">📊 CRM Software Dashboard</div>

<div class="container">

    <!-- FORM -->
    <div class="form">
        <input type="text" id="name" placeholder="Customer Name">
        <input type="text" id="company" placeholder="Company">
        <input type="email" id="email" placeholder="Email">
        
        <select id="status">
            <option value="New">New Lead</option>
            <option value="Contacted">Contacted</option>
            <option value="Converted">Converted</option>
        </select>

        <button onclick="addCustomer()">Add Customer</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="crmTable"></tbody>
    </table>

</div>

<script>
    let customers = [
        { id: 1, name: "Nila", company: "TechSoft", email: "nila@gmail.com", status: "New" },
        { id: 2, name: "pawya", company: "Infosys", email: "pawya@gmail.com", status: "Contacted" }
    ];

    function renderCRM() {
        const table = document.getElementById("crmTable");
        table.innerHTML = "";

        customers.forEach(c => {
            table.innerHTML += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.company}</td>
                    <td>${c.email}</td>
                    <td>
                        <span class="badge ${c.status.toLowerCase()}">
                            ${c.status}
                        </span>
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteCustomer(${c.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function addCustomer() {
        const name = document.getElementById("name").value;
        const company = document.getElementById("company").value;
        const email = document.getElementById("email").value;
        const status = document.getElementById("status").value;

        if (!name || !company || !email) {
            alert("Please fill all fields");
            return;
        }

        const newCustomer = {
            id: customers.length + 1,
            name,
            company,
            email,
            status
        };

        customers.push(newCustomer);

        document.getElementById("name").value = "";
        document.getElementById("company").value = "";
        document.getElementById("email").value = "";
        document.getElementById("status").value = "New";

        renderCRM();
    }

    function deleteCustomer(id) {
        customers = customers.filter(c => c.id !== id);
        renderCRM();
    }

    renderCRM();
</script>

</body>
</html>
