<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi User Management</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 850px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .form input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    .form button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .form button:hover {
        background: #0072ff;
        transform: scale(1.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 10px;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
        transition: 0.3s;
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .delete-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #ff1e3c;
    }

    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        background: #00c851;
    }
</style>
</head>
<body>

<div class="container">
    <h2>👥 Multi User Management Dashboard</h2>

    <div class="form">
        <input type="text" id="name" placeholder="Enter Name">
        <input type="email" id="email" placeholder="Enter Email">
        <input type="text" id="role" placeholder="Role (Admin/User)">
        <button onclick="addUser()">Add User</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
    let users = [
        { id: 1, name: "Nila", email: "nila@gmail.com", role: "Admin" },
        { id: 2, name: "pawya", email: "pawya@gmail.com", role: "User" }
    ];

    function renderUsers() {
        const table = document.getElementById("userTable");
        table.innerHTML = "";

        users.forEach(user => {
            table.innerHTML += `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td><span class="badge">${user.role}</span></td>
                    <td>
                        <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function addUser() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const role = document.getElementById("role").value;

        if (!name || !email || !role) {
            alert("Please fill all fields");
            return;
        }

        const newUser = {
            id: users.length + 1,
            name,
            email,
            role
        };

        users.push(newUser);

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("role").value = "";

        renderUsers();
    }

    function deleteUser(id) {
        users = users.filter(user => user.id !== id);
        renderUsers();
    }

    renderUsers();
</script>

</body>
</html>
