<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Integration Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.firebase-flow{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

.service{
    width:180px;
    padding:20px;
    border-radius:18px;
    text-align:center;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    transition:.4s;
}

.service.active{
    border:2px solid #FFCA28;
    box-shadow:0 0 20px rgba(255,202,40,.6);
}

.arrow{
    font-size:28px;
    align-self:center;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    text-align:center;
}

.card h3{
    color:#FFCA28;
}

.card p{
    margin-top:10px;
    font-size:30px;
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:#FFCA28;
    color:#000;
    font-weight:bold;
}

.logs{
    margin-top:25px;
    background:#020617;
    padding:20px;
    border-radius:15px;
}

#logs{
    color:#22c55e;
    white-space:pre-line;
}

.progress{
    width:100%;
    height:28px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#FFCA28;
    color:black;
    font-weight:bold;
    text-align:center;
    line-height:28px;
    transition:1s;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>🔥 Firebase Integration</h1>
    <p>Authentication, Firestore, Storage & Realtime Database</p>
</div>

<div class="firebase-flow">

    <div class="service" id="step1">
        🔐<br><br>
        Firebase Auth
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="step2">
        📄<br><br>
        Firestore
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="step3">
        ☁️<br><br>
        Cloud Storage
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="step4">
        ⚡<br><br>
        Realtime DB
    </div>

</div>

<div class="stats">

    <div class="card">
        <h3>Users</h3>
        <p id="users">0</p>
    </div>

    <div class="card">
        <h3>Documents</h3>
        <p id="docs">0</p>
    </div>

    <div class="card">
        <h3>Storage</h3>
        <p id="storage">0 MB</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p id="status">Idle</p>
    </div>

</div>

<button onclick="integrateFirebase()">
🔥 Connect Firebase Services
</button>

<div class="progress">
    <div class="bar" id="progressBar">0%</div>
</div>

<div class="logs">
    <h3>Firebase Logs</h3>
    <div id="logs">
Ready to connect Firebase...
    </div>
</div>

</div>

<script>

async function integrateFirebase(){

    const services=[
        "step1",
        "step2",
        "step3",
        "step4"
    ];

    const logs=[
        "Firebase Authentication Connected...",
        "Firestore Database Initialized...",
        "Cloud Storage Linked...",
        "Realtime Database Activated..."
    ];

    document.getElementById("logs").innerHTML="";

    for(let i=0;i<services.length;i++){

        document.getElementById(services[i])
        .classList.add("active");

        document.getElementById("logs")
        .innerHTML += logs[i] + "\n";

        let progress=((i+1)/services.length)*100;

        document.getElementById("progressBar")
        .style.width=progress+"%";

        document.getElementById("progressBar")
        .innerHTML=Math.round(progress)+"%";

        await new Promise(resolve=>setTimeout(resolve,1000));
    }

    document.getElementById("users").innerHTML="150";
    document.getElementById("docs").innerHTML="320";
    document.getElementById("storage").innerHTML="1.8 GB";
    document.getElementById("status").innerHTML="Connected ✅";

    document.getElementById("progressBar")
    .innerHTML="Firebase Integration Complete 🚀";
}

</script>

</body>
</html>
