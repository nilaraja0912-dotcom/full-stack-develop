<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fintech Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    .header {
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
    }

    .container {
        padding: 25px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .value {
        font-size: 26px;
        color: #00c6ff;
        margin-top: 10px;
    }

    .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    .actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        color: white;
        transition: 0.3s;
    }

    .send { background: #ff4b5c; }
    .receive { background: #00c851; }
    .invest { background: #00c6ff; }

    .actions button:hover {
        transform: scale(1.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
        transition: 0.3s;
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .credit { color: #00c851; }
    .debit { color: #ff4b5c; }
</style>

</head>
<body>

<div class="header">💹 Fintech Dashboard</div>

<div class="container">

    <!-- TOP CARDS -->
    <div class="grid">
        <div class="card">
            💰 Wallet Balance
            <div class="value">₹1,25,000</div>
        </div>

        <div class="card">
            📈 Income
            <div class="value">₹80,000</div>
        </div>

        <div class="card">
            📉 Expenses
            <div class="value">₹35,000</div>
        </div>

        <div class="card">
            📊 Savings Rate
            <div class="value">72%</div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <button class="send" onclick="addTxn('Sent', 5000)">Send Money</button>
        <button class="receive" onclick="addTxn('Received', 7000)">Receive</button>
        <button class="invest" onclick="addTxn('Invested', 10000)">Invest</button>
    </div>

    <!-- TRANSACTIONS -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="txnTable"></tbody>
    </table>

</div>

<script>
    let transactions = [];

    function addTxn(type, amount) {
        transactions.push({
            id: transactions.length + 1,
            type,
            amount,
            status: type === "Received" ? "Credit" : "Debit"
        });

        render();
    }

    function render() {
        const table = document.getElementById("txnTable");
        table.innerHTML = "";

        transactions.forEach(t => {
            table.innerHTML += `
                <tr>
                    <td>${t.id}</td>
                    <td>${t.type}</td>
                    <td>₹${t.amount}</td>
                    <td class="${t.status === 'Credit' ? 'credit' : 'debit'}">
                        ${t.status}
                    </td>
                </tr>
            `;
        });
    }

    render();
</script>

</body>
</html>
