<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Record System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
    }

    .container {
        padding: 25px;
    }

    .form {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }

    .form input {
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    .form button {
        grid-column: span 4;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .form button:hover {
        background: #0072ff;
        transform: scale(1.03);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr {
        background: rgba(255,255,255,0.05);
        transition: 0.3s;
    }

    tr:hover {
        background: rgba(255,255,255,0.15);
    }

    .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .A { background: #00c851; }
    .B { background: #00c6ff; }
    .C { background: #ffb703; }
    .F { background: #ff4b5c; }

    .delete-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #ff1e3c;
    }
</style>

</head>
<body>

<div class="header">🎓 Student Record System</div>

<div class="container">

    <!-- FORM -->
    <div class="form">
        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="dept" placeholder="Department">
        <input type="number" id="marks" placeholder="Marks (0-100)">
        <input type="text" id="year" placeholder="Year (1st/2nd/3rd/4th)">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Year</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

</div>

<script>
    let students = [
        { id: 1, name: "Nila", dept: "AI & DS", year: "2nd", marks: 85 },
        { id: 2, name: "pawya", dept: "CSE", year: "3rd", marks: 72 }
    ];

    function getGrade(marks) {
        if (marks >= 90) return "A";
        if (marks >= 75) return "B";
        if (marks >= 60) return "C";
        return "F";
    }

    function renderTable() {
        const table = document.getElementById("studentTable");
        table.innerHTML = "";

        students.forEach(s => {
            const grade = getGrade(s.marks);

            table.innerHTML += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.dept}</td>
                    <td>${s.year}</td>
                    <td>${s.marks}</td>
                    <td>
                        <span class="badge ${grade}">
                            ${grade}
                        </span>
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteStudent(${s.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function addStudent() {
        const name = document.getElementById("name").value;
        const dept = document.getElementById("dept").value;
        const marks = document.getElementById("marks").value;
        const year = document.getElementById("year").value;

        if (!name || !dept || !marks || !year) {
            alert("Please fill all fields");
            return;
        }

        students.push({
            id: students.length + 1,
            name,
            dept,
            year,
            marks: Number(marks)
        });

        document.getElementById("name").value = "";
        document.getElementById("dept").value = "";
        document.getElementById("marks").value = "";
        document.getElementById("year").value = "";

        renderTable();
    }

    function deleteStudent(id) {
        students = students.filter(s => s.id !== id);
        renderTable();
    }

    renderTable();
</script>

</body>
</html>
