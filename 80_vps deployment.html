<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPS Deployment Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.server-flow{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

.node{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:18px;
    width:180px;
    text-align:center;
    transition:.4s;
}

.node.active{
    border:2px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,.5);
}

.arrow{
    font-size:30px;
    align-self:center;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    text-align:center;
}

.card h3{
    color:#38bdf8;
}

.card p{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

.deploy-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.logs{
    margin-top:25px;
    background:#020617;
    padding:20px;
    border-radius:15px;
}

.logs h3{
    margin-bottom:15px;
}

#logs{
    color:#22c55e;
    white-space:pre-line;
}

.progress{
    width:100%;
    height:28px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#22c55e;
    text-align:center;
    line-height:28px;
    transition:1s;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🖥 VPS Deployment Dashboard</h1>
<p>Deploy Full Stack Applications to Virtual Private Server</p>
</div>

<div class="server-flow">

<div class="node" id="step1">
📂<br><br>
GitHub Repo
</div>

<div class="arrow">➡</div>

<div class="node" id="step2">
⚙️<br><br>
Build Process
</div>

<div class="arrow">➡</div>

<div class="node" id="step3">
🐳<br><br>
Docker Container
</div>

<div class="arrow">➡</div>

<div class="node" id="step4">
🖥<br><br>
VPS Server
</div>

<div class="arrow">➡</div>

<div class="node" id="step5">
🌐<br><br>
Live Website
</div>

</div>

<div class="stats">

<div class="card">
<h3>Deployment Status</h3>
<p id="status">Idle</p>
</div>

<div class="card">
<h3>Server Health</h3>
<p id="health">100%</p>
</div>

<div class="card">
<h3>CPU Usage</h3>
<p id="cpu">0%</p>
</div>

<div class="card">
<h3>Uptime</h3>
<p id="uptime">0h</p>
</div>

</div>

<button class="deploy-btn" onclick="deployApp()">
🚀 Deploy Application to VPS
</button>

<div class="progress">
<div class="bar" id="bar">0%</div>
</div>

<div class="logs">
<h3>Deployment Logs</h3>
<div id="logs">
Ready for deployment...
</div>
</div>

</div>

<script>

async function deployApp(){

const steps=["step1","step2","step3","step4","step5"];

const logs=[
"Connecting to GitHub Repository...",
"Building Application...",
"Creating Docker Image...",
"Uploading to VPS Server...",
"Application Live Successfully..."
];

document.getElementById("logs").innerHTML="";

for(let i=0;i<steps.length;i++){

document.getElementById(steps[i]).classList.add("active");

document.getElementById("logs").innerHTML += logs[i] + "\n";

let progress=((i+1)/steps.length)*100;

document.getElementById("bar").style.width=progress+"%";
document.getElementById("bar").innerHTML=Math.round(progress)+"%";

await new Promise(resolve=>setTimeout(resolve,1000));
}

document.getElementById("status").innerHTML="Live ✅";
document.getElementById("cpu").innerHTML="27%";
document.getElementById("uptime").innerHTML="24h";

document.getElementById("bar").innerHTML="Deployment Successful 🚀";
}

</script>

</body>
</html>
