<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Deployment Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.aws-flow{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

.service{
    width:180px;
    padding:20px;
    text-align:center;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    transition:.4s;
}

.service.active{
    border:2px solid #ff9900;
    box-shadow:0 0 20px rgba(255,153,0,.5);
}

.arrow{
    font-size:28px;
    align-self:center;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    text-align:center;
}

.card h3{
    color:#ff9900;
}

.card p{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ff9900;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.logs{
    margin-top:25px;
    background:#020617;
    padding:20px;
    border-radius:15px;
}

#logArea{
    color:#22c55e;
    white-space:pre-line;
}

.progress{
    width:100%;
    height:28px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#ff9900;
    text-align:center;
    line-height:28px;
    font-weight:bold;
    transition:1s;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>☁️ AWS Deployment Dashboard</h1>
    <p>Deploy Applications using AWS Cloud Services</p>
</div>

<div class="aws-flow">

    <div class="service" id="s1">
        📂<br><br>GitHub
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="s2">
        ⚙️<br><br>AWS CodeBuild
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="s3">
        🖥️<br><br>EC2 Server
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="s4">
        🗄️<br><br>RDS Database
    </div>

    <div class="arrow">➡</div>

    <div class="service" id="s5">
        🌍<br><br>CloudFront
    </div>

</div>

<div class="stats">

    <div class="card">
        <h3>Deployment</h3>
        <p id="deployStatus">Idle</p>
    </div>

    <div class="card">
        <h3>EC2 Status</h3>
        <p id="ec2">Offline</p>
    </div>

    <div class="card">
        <h3>Cloud Health</h3>
        <p id="health">100%</p>
    </div>

    <div class="card">
        <h3>Response Time</h3>
        <p id="response">0ms</p>
    </div>

</div>

<button onclick="deployAWS()">
    ☁️ Deploy to AWS
</button>

<div class="progress">
    <div class="bar" id="progressBar">0%</div>
</div>

<div class="logs">
    <h3>AWS Deployment Logs</h3>
    <div id="logArea">
Ready for AWS deployment...
    </div>
</div>

</div>

<script>

async function deployAWS(){

    const services=["s1","s2","s3","s4","s5"];

    const logs=[
        "Fetching source code from GitHub...",
        "Running AWS CodeBuild...",
        "Launching EC2 Instance...",
        "Connecting RDS Database...",
        "Configuring CloudFront CDN..."
    ];

    document.getElementById("logArea").innerHTML="";

    for(let i=0;i<services.length;i++){

        document.getElementById(services[i])
        .classList.add("active");

        document.getElementById("logArea")
        .innerHTML += logs[i] + "\n";

        let progress=((i+1)/services.length)*100;

        document.getElementById("progressBar")
        .style.width=progress+"%";

        document.getElementById("progressBar")
        .innerHTML=Math.round(progress)+"%";

        await new Promise(resolve=>setTimeout(resolve,1000));
    }

    document.getElementById("deployStatus")
    .innerHTML="Success ✅";

    document.getElementById("ec2")
    .innerHTML="Running";

    document.getElementById("response")
    .innerHTML="42ms";

    document.getElementById("progressBar")
    .innerHTML="AWS Deployment Completed 🚀";
}

</script>

</body>
</html>
