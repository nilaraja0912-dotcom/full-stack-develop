<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Cache Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:90%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
h1{
    text-align:center;
    margin-bottom:25px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
}
.value{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
    color:#38bdf8;
}
.btns{
    margin-top:25px;
    text-align:center;
}
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    font-size:16px;
}
.refresh{
    background:#22c55e;
    color:white;
}
.clear{
    background:#ef4444;
    color:white;
}
.cache-data{
    margin-top:25px;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
}
pre{
    color:#facc15;
    overflow:auto;
}
</style>
</head>
<body>

<div class="container">
    <h1>🚀 Redis Cache Dashboard</h1>

    <div class="grid">
        <div class="card">
            <h3>Cache Hits</h3>
            <div class="value" id="hits">1240</div>
        </div>

        <div class="card">
            <h3>Cache Misses</h3>
            <div class="value" id="misses">85</div>
        </div>

        <div class="card">
            <h3>Keys Stored</h3>
            <div class="value" id="keys">540</div>
        </div>

        <div class="card">
            <h3>Status</h3>
            <div class="value">Online</div>
        </div>
    </div>

    <div class="btns">
        <button class="refresh" onclick="refreshCache()">Refresh</button>
        <button class="clear" onclick="clearCache()">Clear Cache</button>
    </div>

    <div class="cache-data">
        <h3>Cached Data</h3>
        <pre id="cacheOutput">
{
  "user": "Nila",
  "role": "Developer",
  "cache": true
}
        </pre>
    </div>
</div>

<script>
function refreshCache(){
    alert("Fetching latest data from Redis Cache...");
}

function clearCache(){
    if(confirm("Clear Redis Cache?")){
        document.getElementById("cacheOutput").innerText="Cache Cleared!";
    }
}
</script>

</body>
</html>
