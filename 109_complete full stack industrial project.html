<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Industrial Dashboard</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.header {
    padding:20px;
    text-align:center;
    font-size:24px;
    background:rgba(255,255,255,0.08);
}

.container {
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.btn {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">🏭 Industrial Full Stack Dashboard</div>

<div class="container">

    <div class="grid">
        <div class="card">📊 Revenue <h2>₹12,00,000</h2></div>
        <div class="card">👥 Users <h2>10,450</h2></div>
        <div class="card">📦 Orders <h2>3,210</h2></div>
        <div class="card">⚙ System Status <h2>Active</h2></div>
    </div>

    <br>

    <button class="btn" onclick="fetchData()">Load Live Data (API)</button>

    <pre id="output"></pre>

</div>

<script>
async function fetchData() {
    const res = await fetch("http://localhost:5000/api/data");
    const data = await res.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
