<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Storage App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
    }

    .container {
        padding: 25px;
    }

    .storage-box {
        background: rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        text-align: center;
        backdrop-filter: blur(10px);
    }

    .bar {
        width: 100%;
        height: 12px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        margin-top: 10px;
        overflow: hidden;
    }

    .fill {
        height: 12px;
        width: 40%;
        background: #00c6ff;
    }

    .upload {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .upload input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    .upload button {
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        background: #00c6ff;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    .upload button:hover {
        background: #0072ff;
    }

    .files {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        padding: 15px;
        border-radius: 15px;
        text-align: center;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .delete {
        margin-top: 10px;
        padding: 6px 10px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
    }

    .delete:hover {
        background: #ff1e3c;
    }
</style>

</head>
<body>

<div class="header">☁️ Cloud Storage Application</div>

<div class="container">

    <!-- STORAGE -->
    <div class="storage-box">
        <h3>Storage Used</h3>
        <div class="bar">
            <div class="fill"></div>
        </div>
        <p>40% of 100GB used</p>
    </div>

    <!-- UPLOAD -->
    <div class="upload">
        <input type="text" id="fileName" placeholder="Enter file name">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <!-- FILE LIST -->
    <div class="files" id="fileList"></div>

</div>

<script>
    let files = [
        { id: 1, name: "Project.docx" },
        { id: 2, name: "Photo.png" }
    ];

    function renderFiles() {
        const list = document.getElementById("fileList");
        list.innerHTML = "";

        files.forEach(f => {
            list.innerHTML += `
                <div class="card">
                    📄 <br><br>
                    ${f.name}
                    <button class="delete" onclick="deleteFile(${f.id})">Delete</button>
                </div>
            `;
        });
    }

    function uploadFile() {
        const name = document.getElementById("fileName").value;

        if (!name) {
            alert("Enter file name");
            return;
        }

        files.push({
            id: files.length + 1,
            name
        });

        document.getElementById("fileName").value = "";
        renderFiles();
    }

    function deleteFile(id) {
        files = files.filter(f => f.id !== id);
        renderFiles();
    }

    renderFiles();
</script>

</body>
</html>
